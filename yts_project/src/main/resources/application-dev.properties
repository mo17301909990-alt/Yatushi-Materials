# 本地开发环境配置
# 使用方式：启动时添加参数 --spring.profiles.active=dev

# 数据库连接配置（本地开发）
spring.datasource.url=jdbc:postgresql://10.2.2.232:5432/gold_foil_db
spring.datasource.username=postgres
spring.datasource.password=Qwe321!@#,.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.pool-name=YtsProjectHikariPool

server.port=8092

spring.security.user.name=admin
spring.security.user.password=123456

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.it.yts_project.model
mybatis.configuration.map-underscore-to-camel-case=true

# 日志配置
logging.level.com.it.yts_project.mapper=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari.pool.HikariPool=DEBUG




