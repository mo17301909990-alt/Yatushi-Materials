# 数据库连接配置
spring.datasource.url=jdbc:postgresql://localhost:5432/gold_foil_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# HikariCP 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
# 连接测试查询
spring.datasource.hikari.connection-test-query=SELECT 1
# 连接池名称
spring.datasource.hikari.pool-name=YtsProjectHikariPool

# 默认 8093，避免与服务器已占用的 8092 冲突；若本机 8092 空闲可改为 8092
server.port=8092

spring.security.user.name=admin
spring.security.user.password=${APP_PASSWORD:-admin888}

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.it.yts_project.model
mybatis.configuration.map-underscore-to-camel-case=true

# CORS配置已移至WebConfig.java和CustomCorsFilter.java中统一管理
# 避免多个CORS配置冲突

# 通义千问 DashScope（生产环境建议用 application-local 覆盖或环境变量）
dashscope.api-key=${DASHSCOPE_API_KEY}
dashscope.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
dashscope.model=qwen-plus

# 操作指南文件上传配置
guide.upload.path=${user.home}/yts_guide_uploads
guide.upload.base-url=/guide-uploads

# Spring 文件上传大小限制（最大100MB）
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=200MB

# AI 对话：注入 public 下所有用户表的结构目录（元数据）最大字符数；表很多时可调大，过大可能接近通义单次 token 上限
ai.chat.schema-catalog.max-chars=80000

# 工艺 Agent 标准书文件路径
agent.material.base-path=${AGENT_DOCS_PATH:F:/YTS+JYY/docs}

# 日志配置
logging.level.com.it.yts_project.mapper=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.com.zaxxer.hikari.HikariConfig=DEBUG
logging.level.com.zaxxer.hikari.pool.HikariPool=DEBUG
